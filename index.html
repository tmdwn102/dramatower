<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>타워</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;}
#wp{width:100vmin;max-width:420px;aspect-ratio:9/16;position:relative;background:#fff;overflow:hidden;}
#cvT{width:100%;height:100%;display:block;}

/* 탑뷰 라벨 — 산세리프 */
#vl{
  position:absolute;top:18px;left:50%;transform:translateX(-50%);
  font-family:sans-serif;font-size:11px;letter-spacing:0.18em;
  color:#222;pointer-events:none;text-transform:uppercase;
}

/* 오른쪽 세로 원형 바 */
#nav{
  position:absolute;right:18px;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;align-items:center;gap:10px;
}
.dot{
  width:10px;height:10px;border-radius:50%;
  background:rgba(0,0,0,0.15);cursor:pointer;
  touch-action:manipulation;transition:background 0.2s,transform 0.2s;
}
.dot.active{background:#111;transform:scale(1.4);}

/* 하단 버튼 그룹 */
#btns{
  position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  display:flex;gap:8px;align-items:center;
}
#re,#tog{
  padding:6px 16px;border:1px solid #ccc;background:rgba(255,255,255,0.9);
  border-radius:16px;cursor:pointer;font-size:11px;color:#555;
  font-family:sans-serif;touch-action:manipulation;white-space:nowrap;
}
#tog.off{background:rgba(0,0,0,0.08);color:#aaa;}
</style>
</head>

<div id="wp">
<canvas id="cvT"></canvas>
<div id="vl">TOP VIEW</div>
<div id="nav"></div>
<div id="btns">
  <button id="re">↺ 다시</button>
  <button id="tog">TEXT ON</button>
</div>

  sun.shadow.camera.top=16;

  for(var di=0;di<VIEWS.length;di++){
    var dot=document.createElement('div');
    dot.className='dot'+(di===0?' active':'');
    dot.setAttribute('data-i',di);
    dot.addEventListener('click',(function(idx){return function(){setView(idx);};})(di));
    navEl.appendChild(dot);
    dots.push(dot);
  }

  var vlEl=document.getElementById('vl');
  function setView(i){
    vi=(i+VIEWS.length)%VIEWS.length;
    var v=VIEWS[vi];
    aimP.set(v.p[0],v.p[1],v.p[2]);
    aimT.set(v.t[0],v.t[1],v.t[2]);
    vlEl.textContent=v.lb;
    for(var d=0;d<dots.length;d++) dots[d].className='dot'+(d===vi?' active':'');
  }

  var Q=[], TQ=[];
  var DROP=2.8, DUR=320, STEP=85;
  var t0=Date.now();

  function eob(x){var c1=1.70158,c3=c1+1;return x>=1?1:1+c3*Math.pow(x-1,3)+c1*Math.pow(x-1,2);}
  function ms(c){return new THREE.MeshStandardMaterial({color:c,metalness:0,roughness:0.78});}

  function reg(obj,baseY){
    obj.visible=false;
    obj.position.set(obj.position.x,baseY+DROP,obj.position.z);
    Q.push({obj:obj,oy:baseY,sy:baseY+DROP});
  }
  function mkBox(w,h,d,col,x,y,z){
    var m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),ms(col));
    m.position.set(x,y,z);
    m.castShadow=true; m.receiveShadow=true;
    rt.add(m); reg(m,y); return m;
  }
  function hp(w,d,c,x,y,z){return mkBox(w,0.065,d,c,x,y,z);}
  function vx(h,d,c,x,y,z){return mkBox(0.065,h,d,c,x,y,z);}
  function vz(w,h,c,x,y,z){return mkBox(w,h,0.065,c,x,y,z);}
  function bk(w,h,d,c,x,y,z){return mkBox(w,h,d,c,x,y,z);}
  function rod(ax,ay,az,bx,by,bz,r,c,par){
    if(!par)par=rt;
    var dx=bx-ax,dy=by-ay,dz=bz-az,l=Math.sqrt(dx*dx+dy*dy+dz*dz);
    if(l<0.01)return;
    var m=new THREE.Mesh(new THREE.CylinderGeometry(r,r,l,6),ms(c));
    m.position.set((ax+bx)/2,(ay+by)/2,(az+bz)/2);
    m.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),new THREE.Vector3(dx,dy,dz).normalize());
    par.add(m);
  }
  function burst(n,mn,mx,cols,br,par){
    var phi=Math.PI*(3-Math.sqrt(5));
    for(var i=0;i<n;i++){
      var t=i/n,ic=Math.acos(1-2*t),az=phi*i;
      var dx=Math.sin(ic)*Math.cos(az),dy=Math.cos(ic),dz=Math.sin(ic)*Math.sin(az);
      var ll=mn+(mx-mn)*((i*7.3%n)/n);
      rod(0,0,0,dx*ll,dy*ll,dz*ll,br*(0.6+0.8*(i*3.7%1)),cols[i%cols.length],par);

  }
  function mdisc(r,c,x,y,z,rx,ry,rz,bn,bmn,bmx,bcols){
    var g=new THREE.Group();

    d.rotation.set(rx,ry,rz); g.add(d);

  var LG=0x3A8C3A,B2=0x7898D0,TL=0x1E7060,SL=0xD08880,PV=0x7884C8;
